name: Deploy web build to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs of this workflow.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with LFS for boot.mp3)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.64
          actions-cache-folder: emsdk-cache

      - name: Configure (emcmake)
        run: emcmake cmake -S . -B build-web -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-web --parallel

      - name: Stage site
        run: |
          mkdir -p public
          cp build-web/src_raylib/index.html public/
          cp build-web/src_raylib/index.js   public/
          cp build-web/src_raylib/index.wasm public/
          cp build-web/src_raylib/index.data public/
          # GitHub Pages must not run Jekyll over the wasm/data files
          touch public/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
