<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>VFD-9000 — terminal escape room</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0a0a0a; overflow: hidden; }
    /* fill the device viewport so the unit scales on phones/tablets; touch-action
       none keeps taps from scrolling/zooming the page while typing */
    #canvas { display: block; width: 100vw; height: 100vh; background: #000;
              outline: none; touch-action: none; }
    #note {
      position: fixed; left: 0; right: 0; bottom: 6px; text-align: center;
      color: #4a6b62; font: 12px ui-monospace, monospace; opacity: .7;
      pointer-events: none; letter-spacing: .04em;
    }
    #note.hide { display: none; }
  </style>
</head>
<body>
  <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  <div id="note">click the screen to enable sound &middot; F11 fullscreen</div>
  <script>
    // Browsers block audio until a user gesture; hide the hint after first click.
    addEventListener('pointerdown', function () {
      var n = document.getElementById('note');
      if (n) n.classList.add('hide');
    }, { once: true });

    var Module = {
      canvas: document.getElementById('canvas'),
      print: function (t) { console.log(t); },
      printErr: function (t) { console.error(t); },
    };
  </script>
  {{{ SCRIPT }}}
</body>
</html>
